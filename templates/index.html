<!DOCTYPE html>
<html>
<head>
<title>SEO Content Analyzer</title>

<style>

body{
    font-family: Arial;
    background:#f2f4f7;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    border-radius:8px;
    width:400px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    text-align:center;
}

h1{
    color:#2c3e50;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:4px;
}

button{
    width:100%;
    padding:12px;
    background:#2c7be5;
    color:white;
    border:none;
    border-radius:4px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1a68d1;
}

</style>

</head>

<body>

<div class="container">

<h1>SEO Content Analyzer</h1>

<form action="/analyze" method="POST">

<label>Enter URL</label>
<input type="text" name="url" placeholder="https://example.com" required>

<label>Target Keyword</label>
<input type="text" name="keyword" placeholder="Enter keyword" required>

<button type="submit">Analyze</button>

</form>

</div>

</body>
</html>
